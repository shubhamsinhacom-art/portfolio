<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WK/UP | Creative Director Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #f0f0f0; 
            margin: 0;
            overflow-x: hidden;
            cursor: none; 
        }
        
        .font-display { font-family: 'Anton', sans-serif; }
        .font-header { font-family: 'Syne', sans-serif; }

        .blob {
            position: fixed; border-radius: 50%; filter: blur(80px);
            z-index: -1; opacity: 0.3; pointer-events: none;
        }

        .mascot-container {
            position: fixed; bottom: 40px; right: 40px;
            width: 80px; height: 80px; z-index: 100;
        }
        .mascot-body {
            width: 100%; height: 100%; background: white;
            border-radius: 50%; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .mascot-pupil {
            width: 30px; height: 30px; background: #000;
            border-radius: 50%; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .mascot-eyelid {
            position: absolute; top: 0; left: 0; right: 0;
            height: 0%; background: #050505; z-index: 10;
        }
        
        ::-webkit-scrollbar { width: 0px; }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, textarea {
            background: transparent !important;
            border-bottom: 1px solid rgba(255,255,255,0.2) !important;
            outline: none !important;
        }
        input:focus, textarea:focus {
            border-bottom: 1px solid #f97316 !important;
        }

        .project-image {
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .group:hover .project-image {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect } = React;
        gsap.registerPlugin(ScrollTrigger);

        // --- DATA SECTION ---
        // Add your image URLs and Project URLs here
        const PROJECTS = [
            { 
                id: "lost-stories", 
                title: "LOST STORIES", 
                category: "Illustration Book", 
                year: "2025", 
                color: "from-orange-500 to-yellow-500", 
                desc: "Revitalizing a legacy juice brand with dynamic fluid motion systems.", 
                details: "Full identity overhaul including custom type and packaging.",
                image: "./new/final.png", 
                link: "https://www.behance.net/gallery/230256767/Lost-Stories-A-Personal-Illustration-Book-Project" 
            },
            { 
                id: "ramesh-juice", 
                title: "RAMESH JUICE CORNER", 
                category: "BRANDING", 
                year: "2025", 
                color: "from-blue-600 to-indigo-600", 
                desc: "Patna Retail Store Virtual Experience with interactive 3D navigation.", 
                details: "A bridge between physical retail and spatial computing.",
                image: "new/ss.jpg",
                link: "#"
            },
            { 
                id: "unboxed", 
                title: "UNBOXED IDENTITY", 
                category: "ARTWORK", 
                year: "2026", 
                color: "from-red-800 to-red-950", 
                desc: "A short film narrative exploring the architecture of silence.", 
                details: "Premiered at International Indie Fest 2025.",
                image: "new/neww.jpg",
                link: "https://www.behance.net/gallery/246306433/Unboxed-Identity"
            },
            { 
                id: "marshall", 
                title: "MARSHALL", 
                category: "CATALOG CONCEPT", 
                year: "2026", 
                color: "from-emerald-600 to-teal-800", 
                desc: "Modernizing handloom traditions for a digital-first generation.", 
                details: "Sustainable fashion meets geometric minimalism.",
                image: "new/aa.gif",
                link: "#"
            }
        ];

        // --- SUB-COMPONENTS ---

        const AmbientBackground = () => {
            useEffect(() => {
                const moveBlobs = (e) => {
                    const x = (e.clientX / window.innerWidth - 0.5) * 50;
                    const y = (e.clientY / window.innerHeight - 0.5) * 50;
                    gsap.to(".blob-move", { x: x, y: y, duration: 2, ease: "power2.out", stagger: 0.1 });
                };
                window.addEventListener("mousemove", moveBlobs);
                return () => window.removeEventListener("mousemove", moveBlobs);
            }, []);

            return (
                <div className="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
                    <div className="blob blob-move bg-orange-600 w-[500px] h-[500px] top-[-10%] left-[-10%]"></div>
                    <div className="blob blob-move bg-blue-800 w-[400px] h-[400px] bottom-[-5%] right-[-5%]"></div>
                    <div className="blob blob-move bg-purple-900 w-[300px] h-[300px] top-[40%] left-[45%] opacity-20"></div>
                </div>
            );
        };

        const Mascot = () => {
            const pupilRef = useRef(null);
            const bodyRef = useRef(null);
            const eyelidRef = useRef(null);

            useEffect(() => {
                const moveEye = (e) => {
                    if (!bodyRef.current || !pupilRef.current) return;
                    const rect = bodyRef.current.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                    const dist = Math.min(15, Math.hypot(e.clientX - centerX, e.clientY - centerY) / 20);
                    gsap.to(pupilRef.current, { x: Math.cos(angle) * dist, y: Math.sin(angle) * dist, duration: 0.2 });
                };

                const blink = setInterval(() => {
                    if(eyelidRef.current) {
                        gsap.to(eyelidRef.current, { height: "100%", duration: 0.1, onComplete: () => {
                            gsap.to(eyelidRef.current, { height: "0%", duration: 0.1, delay: 0.1 });
                        }});
                    }
                }, 4500);

                window.addEventListener("mousemove", moveEye);
                return () => { window.removeEventListener("mousemove", moveEye); clearInterval(blink); };
            }, []);

            return (
                <div ref={bodyRef} className="mascot-container hidden md:block">
                    <div className="mascot-body">
                        <div ref={eyelidRef} className="mascot-eyelid"></div>
                        <div ref={pupilRef} className="mascot-pupil"></div>
                    </div>
                </div>
            );
        };

        const Cursor = () => {
            const cursorRef = useRef(null);
            useEffect(() => {
                const move = (e) => gsap.to(cursorRef.current, { x: e.clientX, y: e.clientY, duration: 0.1 });
                window.addEventListener("mousemove", move);
                return () => window.removeEventListener("mousemove", move);
            }, []);
            return <div ref={cursorRef} className="fixed top-0 left-0 w-4 h-4 bg-white rounded-full mix-blend-difference pointer-events-none z-[10000] -translate-x-1/2 -translate-y-1/2"></div>;
        };

        // --- VIEWS ---

        const IntroView = ({ onComplete }) => {
            const eyelidRef = useRef(null);
            const wake = () => {
                gsap.to(eyelidRef.current, { height: "0%", duration: 1, ease: "power4.inOut", onComplete });
            };
            return (
                <div className="fixed inset-0 bg-black z-[200] flex flex-col items-center justify-center cursor-pointer" onClick={wake}>
                    <div className="relative w-48 h-48 bg-white rounded-full flex items-center justify-center overflow-hidden mb-8 shadow-2xl">
                        <div className="w-14 h-14 bg-black rounded-full"></div>
                        <div ref={eyelidRef} className="absolute top-0 left-0 w-full h-full bg-black border-b border-white/20"></div>
                    </div>
                    <h1 className="font-display text-4xl tracking-[0.6em] animate-pulse">PORTFOLIO</h1>
                    <p className="mt-6 text-[10px] text-gray-500 uppercase tracking-widest">Tap to initiate system</p>
                </div>
            );
        };

        const HomeView = ({ onNavigate }) => {
            useEffect(() => {
                gsap.from(".hero-line", { y: 100, opacity: 0, stagger: 0.1, duration: 1, ease: "power4.out" });
            }, []);
            return (
                <main className="h-screen flex flex-col justify-center px-10 md:px-24">
                    <h1 className="font-display text-[12vw] leading-[0.85] hero-line">
                        WK/UP <br/> <span className="opacity-30">STUDIO</span>
                    </h1>
                    <div className="mt-12 flex flex-col md:flex-row md:items-center gap-8 hero-line">
                        <p className="max-w-md text-gray-400 text-lg font-light leading-relaxed">
                            Crafting high-fidelity digital experiences and visual narratives in the heart of Patna.
                        </p>
                        <button onClick={() => onNavigate('work')} className="group relative w-fit px-10 py-4 glass rounded-full overflow-hidden transition-all hover:border-orange-500">
                            <span className="relative z-10 uppercase text-xs tracking-widest group-hover:text-black transition-colors">Enter Gallery</span>
                            <div className="absolute inset-0 bg-white translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        </button>
                    </div>
                </main>
            );
        };

        const WorkView = ({ onOpenProject }) => {
            return (
                <section className="pt-40 px-6 md:px-24 pb-24">
                    <h2 className="font-header text-5xl mb-20 opacity-20 uppercase tracking-tighter">Selected Works</h2>
                    <div className="grid grid-cols-1 gap-12">
                        {PROJECTS.map((proj) => (
                            <div key={proj.id} onClick={() => onOpenProject(proj)} 
                                 className="group glass p-4 md:p-6 rounded-[2rem] cursor-pointer relative overflow-hidden transition-all hover:bg-white/5">
                                
                                {/* Image Container */}
                                <div className="relative w-full h-[40vh] md:h-[60vh] overflow-hidden rounded-2xl mb-8">
                                    <img 
                                        src={proj.image} 
                                        alt={proj.title} 
                                        className="project-image w-full h-full object-cover grayscale group-hover:grayscale-0"
                                    />
                                    <div className={`absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-60`}></div>
                                </div>

                                <div className="px-4 pb-4 relative z-10 flex flex-col md:flex-row justify-between items-end">
                                    <div>
                                        <p className="text-orange-500 font-mono text-xs mb-2 tracking-widest uppercase">0{PROJECTS.indexOf(proj)+1} / {proj.category}</p>
                                        <h3 className="font-display text-5xl md:text-8xl uppercase tracking-tighter group-hover:italic transition-all">{proj.title}</h3>
                                    </div>
                                    <div className="text-right mt-6 md:mt-0">
                                        <div className="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-orange-500 group-hover:border-orange-500 transition-all">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                                        </div>
                                        <p className="text-xs text-gray-500 mt-4 font-mono tracking-widest">{proj.year}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const DetailView = ({ project, onBack }) => {
            useLayoutEffect(() => {
                window.scrollTo(0, 0);
                gsap.from(".reveal", { y: 60, opacity: 0, duration: 0.8, stagger: 0.1, ease: "power3.out" });
            }, [project]);

            return (
                <article className="pt-40 px-6 md:px-24 pb-40 min-h-screen">
                    <button onClick={onBack} className="mb-12 text-[10px] uppercase tracking-[0.3em] opacity-40 hover:opacity-100 transition-opacity underline decoration-orange-500 underline-offset-8">
                        Back to Works
                    </button>
                    <h1 className="reveal font-display text-[12vw] leading-none mb-12 tracking-tighter uppercase">
                        {project.title}
                    </h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-20">
                        <div className="reveal md:col-span-2">
                            <p className="text-2xl md:text-4xl text-gray-300 leading-tight font-light mb-8">{project.desc}</p>
                            <p className="text-gray-500 max-w-xl">{project.details}</p>
                        </div>
                        <div className="reveal space-y-6">
                            <div className="glass p-8 rounded-2xl">
                                <p className="uppercase text-[10px] tracking-widest text-gray-400 mb-4 italic">Discovery</p>
                                <a href={project.link} target="_blank" className="flex items-center justify-between group">
                                    <span className="text-xl font-header">VISIT PROJECT</span>
                                    <span className="text-orange-500 group-hover:translate-x-2 transition-transform">→</span>
                                </a>
                            </div>
                            <div className="flex justify-between px-4 uppercase text-[10px] tracking-[0.2em] text-gray-500">
                                <span>{project.category}</span>
                                <span>{project.year}</span>
                            </div>
                        </div>
                    </div>

                    <div className="reveal w-full rounded-3xl overflow-hidden shadow-2xl">
                        <img src={project.image} className="w-full h-auto object-cover" alt={project.title} />
                    </div>
                </article>
            );
        };

        const ContactView = () => {
            const [submitted, setSubmitted] = useState(false);
            useLayoutEffect(() => {
                gsap.from(".contact-reveal", { y: 30, opacity: 0, duration: 0.8, stagger: 0.1 });
            }, []);
            const handleSubmit = (e) => { e.preventDefault(); setSubmitted(true); };

            return (
                <section className="pt-40 px-6 md:px-24 pb-24 min-h-screen flex flex-col items-center justify-center">
                    {!submitted ? (
                        <div className="w-full max-w-4xl">
                            <h2 className="font-display text-7xl md:text-9xl mb-12 tracking-tighter contact-reveal italic">SAY HELLO.</h2>
                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-12 contact-reveal">
                                <div className="flex flex-col gap-8">
                                    <input type="text" placeholder="YOUR NAME" className="py-4 text-xl font-header uppercase placeholder:opacity-20" required />
                                    <input type="email" placeholder="YOUR EMAIL" className="py-4 text-xl font-header uppercase placeholder:opacity-20" required />
                                </div>
                                <div className="flex flex-col gap-8">
                                    <textarea placeholder="PROJECT DETAILS" rows="1" className="py-4 text-xl font-header uppercase placeholder:opacity-20 resize-none" required></textarea>
                                    <button type="submit" className="glass py-6 rounded-full font-header tracking-widest hover:bg-orange-500 hover:text-white transition-all">SEND INQUIRY</button>
                                </div>
                            </form>
                        </div>
                    ) : (
                        <div className="text-center">
                            <h2 className="font-display text-8xl text-orange-500 mb-4 italic">SENT.</h2>
                            <p className="font-header tracking-widest opacity-50 uppercase">We'll wake you up soon.</p>
                        </div>
                    )}
                </section>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [view, setView] = useState('intro');
            const [activeProject, setActiveProject] = useState(null);

            const handleNavigate = (dest, project = null) => {
                if (project) setActiveProject(project);
                setView(dest);
                window.scrollTo(0, 0);
            };

            return (
                <>
                    <AmbientBackground />
                    <Cursor />
                    {view === 'intro' ? (
                        <IntroView onComplete={() => setView('home')} />
                    ) : (
                        <>
                            <Mascot />
                            <nav className="fixed top-0 w-full p-10 flex justify-between items-center z-[150] mix-blend-difference">
                                <div className="font-header text-2xl tracking-tighter cursor-pointer" onClick={() => handleNavigate('home')}>WK/UP.</div>
                                <div className="flex gap-10 text-[10px] uppercase tracking-[0.3em]">
                                    <button onClick={() => handleNavigate('work')} className={`transition-colors ${view === 'work' ? 'text-orange-500' : 'hover:text-orange-500'}`}>Projects</button>
                                    <button onClick={() => handleNavigate('contact')} className={`transition-colors ${view === 'contact' ? 'text-orange-500' : 'hover:text-orange-500'}`}>Contact</button>
                                </div>
                            </nav>
                            
                            {view === 'home' && <HomeView onNavigate={handleNavigate} />}
                            {view === 'work' && <WorkView onOpenProject={(p) => handleNavigate('detail', p)} />}
                            {view === 'detail' && activeProject && <DetailView project={activeProject} onBack={() => setView('work')} />}
                            {view === 'contact' && <ContactView />}
                        </>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
